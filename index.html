<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sceon Systems</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #f0f6fc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }

    main {
      max-width: 760px;
      padding: 40px 24px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border: 1px solid #30363d;
      border-radius: 999px;
      color: #8b949e;
      margin-bottom: 24px;
      font-size: 14px;
    }

    h1 {
      font-size: clamp(42px, 8vw, 76px);
      margin: 0 0 18px;
      letter-spacing: -2px;
    }

    p {
      font-size: clamp(18px, 3vw, 24px);
      line-height: 1.6;
      color: #c9d1d9;
      margin: 0 auto 30px;
    }

    .highlight {
      color: #58a6ff;
    }

    footer {
      margin-top: 48px;
      color: #8b949e;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <div class="badge">Software • AI • Automation</div>

    <h1>Sceon Systems</h1>

    <p>
      Building intelligent software for
      <span class="highlight">data</span>,
      <span class="highlight">creativity</span>,
      and <span class="highlight">automation</span>.
    </p>

    <p>
      We create private, production-ready platforms that turn complex digital workflows
      into simple, useful tools.
    </p>

    <footer>
      © 2026 Sceon Systems. All rights reserved.
    </footer>
  </main>
</body>
</html>
